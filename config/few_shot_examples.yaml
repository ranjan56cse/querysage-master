examples:
  - id: 1
    natural_language: "Show me total revenue by region."
    sql: |
      SELECT
        r.region_name,
        SUM(o.total_revenue) AS total_revenue
      FROM orders AS o
      JOIN regions AS r ON o.region_id = r.region_id
      GROUP BY r.region_name
      ORDER BY total_revenue DESC;

  - id: 2
    natural_language: "Who are the top 5 sales reps by revenue this year?"
    sql: |
      SELECT
        sr.rep_name,
        SUM(srp.revenue) AS total_revenue
      FROM sales_rep_performance AS srp
      JOIN sales_reps AS sr ON srp.rep_id = sr.rep_id
      WHERE srp.year = EXTRACT(YEAR FROM CURRENT_DATE)
      GROUP BY sr.rep_name
      ORDER BY total_revenue DESC
      LIMIT 5;

  - id: 3
    natural_language: "Which product categories generate the most revenue?"
    sql: |
      SELECT
        c.category_name,
        SUM(oi.line_revenue) AS total_revenue
      FROM order_items AS oi
      JOIN products AS p ON oi.product_id = p.product_id
      JOIN categories AS c ON p.category_id = c.category_id
      GROUP BY c.category_name
      ORDER BY total_revenue DESC;

  - id: 4
    natural_language: "Show monthly sales trend for the current year."
    sql: |
      SELECT
        ms.month,
        SUM(ms.revenue) AS monthly_revenue,
        SUM(ms.units_sold) AS total_units
      FROM monthly_sales AS ms
      WHERE ms.year = EXTRACT(YEAR FROM CURRENT_DATE)
      GROUP BY ms.month
      ORDER BY ms.month ASC;

  - id: 5
    natural_language: "Find customers at risk of churning."
    sql: |
      SELECT
        ch.customer_name,
        ch.segment,
        ch.nps_score,
        ch.renewal_probability,
        ch.last_order_date
      FROM customer_health AS ch
      WHERE ch.churn_flag = TRUE
         OR ch.last_order_date < CURRENT_DATE - INTERVAL '180 days'
      ORDER BY ch.renewal_probability ASC
      LIMIT 20;
