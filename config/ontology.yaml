business_rules:
  fiscal_year_start: "April"
  revenue_metric: "SUM(order_items.line_revenue)  -- line_revenue is a GENERATED column: units_ordered * unit_price * (1 - discount_pct/100)"
  order_total: "orders.total_revenue is auto-synced by trigger from SUM(order_items.line_revenue)"
  active_customer_definition: "A customer in customer_health whose last_order_date >= CURRENT_DATE - INTERVAL '90 days'"
  active_customer_filter: "ch.last_order_date >= CURRENT_DATE - INTERVAL '90 days'"
  churn_definition: "customer_health.churn_flag = TRUE or last_order_date < CURRENT_DATE - INTERVAL '180 days'"
  growth_calculation: "(current_value - previous_value) / NULLIF(previous_value, 0)"
  customer_segments: "Enterprise, Mid-Market, SMB (enum: customer_segment_type)"
  channels: "Direct, Partner, Online (enum: channel_type)"
  discount_steps: "0, 5, 10, 15, 20, 25, 30 percent only"
  nps_range: "-100 to 100 (in customer_health.nps_score)"
  monthly_sales_grain: "one row per product × region × year × month"
  sales_targets_grain: "one row per product × region × year × month"
